<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>插件iframe集成展示 - NavLink</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            text-align: center;
        }
        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            font-size: 1.1em;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .tab {
            padding: 12px 24px;
            background: #f0f0f0;
            border: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1em;
        }
        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .tab-content {
            display: none;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .tab-content.active {
            display: block;
        }
        iframe {
            width: 100%;
            height: 800px;
            border: none;
            border-radius: 8px;
            background: white;
        }
        .info-panel {
            background: #f0f2f5;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .info-panel h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .info-item {
            margin: 8px 0;
            font-family: 'Courier New', monospace;
        }
        .success { color: #52c41a; }
        .warning { color: #faad14; }
        .note { 
            background: #fffbe6;
            border-left: 4px solid #faad14;
            padding: 15px;
            margin: 15px 0;
            border-radius: 0 8px 8px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 NavLink 插件iframe集成展示</h1>
            <p class="subtitle">通过主应用无缝嵌入插件，用户感知不到边界</p>
        </header>

        <div class="info-panel">
            <h3>架构说明</h3>
            <div class="info-item"><strong>主应用地址:</strong> http://127.0.0.1:5173/</div>
            <div class="info-item"><strong>插件路由:</strong> /apps/{pluginId}/</div>
            <div class="info-item"><strong>iframe集成:</strong> 主应用 → iframe → 插件前端</div>
            <div class="note">
                <strong>💡 注意事项:</strong><br>
                • 插件通过Gateway获取用户上下文<br>
                • API调用自动走Gateway代理<br>
                • 样式完全融合，无边界感<br>
                • 用户体验就像一个完整系统
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('vps')">VPS管理</button>
            <button class="tab" onclick="switchTab('docker')">Docker管理</button>
            <button class="tab" onclick="switchTab('sub')">订阅管理</button>
            <button class="tab" onclick="switchTab('hello')">Hello World</button>
        </div>

        <div id="vps-tab" class="tab-content active">
            <iframe src="http://127.0.0.1:5173/apps/vps/"></iframe>
        </div>
        <div id="docker-tab" class="tab-content">
            <iframe src="http://127.0.0.1:5173/apps/docker/"></iframe>
        </div>
        <div id="sub-tab" class="tab-content">
            <iframe src="http://127.0.0.1:5173/apps/sub/"></iframe>
        </div>
        <div id="hello-tab" class="tab-content">
            <iframe src="http://127.0.0.1:5173/apps/hello-world/"></iframe>
        </div>
    </div>

    <script>
        function switchTab(tabName) {
            // 隐藏所有tab
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(el => {
                el.classList.remove('active');
            });

            // 显示当前tab
            document.getElementById(`${tabName}-tab`).classList.add('active');
            event.target.classList.add('active');
        }

        // 页面加载提示
        window.onload = () => {
            console.log('🚀 插件集成展示页面加载完成');
            console.log('🔧 通过以下地址访问插件:');
            console.log('  - VPS管理: http://127.0.0.1:5173/apps/vps/');
            console.log('  - Docker管理: http://127.0.0.1:5173/apps/docker/');
            console.log('  - 订阅管理: http://127.0.0.1:5173/apps/sub/');
            console.log('  - Hello World: http://127.0.0.1:5173/apps/hello-world/');
        };
    </script>
</body>
</html>
