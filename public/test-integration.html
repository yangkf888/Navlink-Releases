<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>插件架构集成测试 - NavLink</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            text-align: center;
        }
        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            font-size: 1.1em;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        .status.online { background: #52c41a; }
        .status.offline { background: #ff4d4f; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .info {
            background: #f0f2f5;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            margin: 5px;
            transition: all 0.3s ease;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        .result {
            background: #1e1e1e;
            color: #00ff00;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .iframe-demo {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            padding: 12px 24px;
            background: #f0f0f0;
            border: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        iframe {
            width: 100%;
            height: 700px;
            border: none;
            border-radius: 8px;
            background: white;
        }
        .success { color: #52c41a; }
        .error { color: #ff4d4f; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 NavLink 新架构集成测试</h1>
            <p class="subtitle">固定端口 + 服务注册 + 统一路由 + iframe无缝集成</p>
        </header>

        <!-- 插件状态卡片 -->
        <div class="grid">
            <div class="card">
                <h2><span class="status online"></span>VPS管理</h2>
                <div class="info">
                    端口: <strong>10004</strong><br>
                    路由: <code>/plugin/vps/*</code><br>
                    状态: <span id="vps-status">检测中...</span>
                </div>
                <button onclick="testPlugin('vps', 10004)">测试直连</button>
                <button onclick="testPluginViaGateway('vps')">测试网关</button>
                <div id="vps-result" class="result" style="display:none;"></div>
            </div>

            <div class="card">
                <h2><span class="status online"></span>Docker管理</h2>
                <div class="info">
                    端口: <strong>10001</strong><br>
                    路由: <code>/plugin/docker/*</code><br>
                    状态: <span id="docker-status">检测中...</span>
                </div>
                <button onclick="testPlugin('docker', 10001)">测试直连</button>
                <button onclick="testPluginViaGateway('docker')">测试网关</button>
                <div id="docker-result" class="result" style="display:none;"></div>
            </div>

            <div class="card">
                <h2><span class="status online"></span>订阅管理</h2>
                <div class="info">
                    端口: <strong>10003</strong><br>
                    路由: <code>/plugin/sub/*</code><br>
                    状态: <span id="sub-status">检测中...</span>
                </div>
                <button onclick="testPlugin('sub', 10003)">测试直连</button>
                <button onclick="testPluginViaGateway('sub')">测试网关</button>
                <div id="sub-result" class="result" style="display:none;"></div>
            </div>

            <div class="card">
                <h2><span class="status online"></span>Hello World</h2>
                <div class="info">
                    端口: <strong>10002</strong><br>
                    路由: <code>/plugin/hello-world/*</code><br>
                    状态: <span id="hello-status">检测中...</span>
                </div>
                <button onclick="testPlugin('hello-world', 10002)">测试直连</button>
                <button onclick="testPluginViaGateway('hello-world')">测试网关</button>
                <div id="hello-result" class="result" style="display:none;"></div>
            </div>
        </div>

        <!-- iframe集成演示 -->
        <div class="iframe-demo">
            <h2 style="margin-bottom: 20px;">📱 iframe无缝集成演示</h2>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('vps')">VPS管理</button>
                <button class="tab" onclick="switchTab('docker')">Docker管理</button>
                <button class="tab" onclick="switchTab('sub')">订阅管理</button>
            </div>

            <div id="vps-tab" class="tab-content active">
                <iframe src="http://127.0.0.1:10004/"></iframe>
            </div>
            <div id="docker-tab" class="tab-content">
                <iframe src="http://127.0.0.1:10001/"></iframe>
            </div>
            <div id="sub-tab" class="tab-content">
                <iframe src="http://127.0.0.1:10003/"></iframe>
            </div>
        </div>
    </div>

    <script>
        // 页面加载时检测所有插件状态
        window.onload = async () => {
            await checkAllPlugins();
        };

        async function checkAllPlugins() {
            const plugins = [
                { id: 'vps', port: 10004 },
                { id: 'docker', port: 10001 },
                { id: 'sub', port: 10003 },
                { id: 'hello-world', port: 10002, label: 'hello' }
            ];

            for (const plugin of plugins) {
                try {
                    const response = await fetch(`http://127.0.0.1:${plugin.port}/api/health`);
                    const data = await response.json();
                    const statusEl = document.getElementById(`${plugin.label || plugin.id}-status`);
                    if (data.status === 'healthy') {
                        statusEl.innerHTML = '<span class="success">✓ 在线</span>';
                    } else {
                        statusEl.innerHTML = '<span class="error">✗ 异常</span>';
                    }
                } catch (error) {
                    const statusEl = document.getElementById(`${plugin.label || plugin.id}-status`);
                    statusEl.innerHTML = '<span class="error">✗ 离线</span>';
                }
            }
        }

        async function testPlugin(pluginId, port) {
            const resultEl = document.getElementById(`${pluginId}-result`);
            resultEl.style.display = 'block';
            resultEl.textContent = '正在测试直连访问...';

            try {
                const response = await fetch(`http://127.0.0.1:${port}/api/health`);
                const data = await response.json();
                resultEl.textContent = `✓ 直连成功!\n\n${JSON.stringify(data, null, 2)}`;
                resultEl.style.color = '#52c41a';
            } catch (error) {
                resultEl.textContent = `✗ 直连失败!\n\n错误: ${error.message}`;
                resultEl.style.color = '#ff4d4f';
            }
        }

        async function testPluginViaGateway(pluginId) {
            const resultEl = document.getElementById(`${pluginId}-result`);
            resultEl.style.display = 'block';
            resultEl.textContent = '正在测试网关路由...';

            try {
                // 通过Vite代理访问
                const response = await fetch(`/plugin/${pluginId}/api/health`);
                const data = await response.json();
                
                if (data.error) {
                    resultEl.textContent = `⚠ 需要认证 (代理正常)\n\n${JSON.stringify(data, null, 2)}`;
                    resultEl.style.color = '#faad14';
                } else {
                    resultEl.textContent = `✓ 网关路由成功!\n\n${JSON.stringify(data, null, 2)}`;
                    resultEl.style.color = '#52c41a';
                }
            } catch (error) {
                resultEl.textContent = `✗ 网关路由失败!\n\n错误: ${error.message}`;
                resultEl.style.color = '#ff4d4f';
            }
        }

        function switchTab(tabName) {
            // 隐藏所有tab
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(el => {
                el.classList.remove('active');
            });

            // 显示当前tab
            document.getElementById(`${tabName}-tab`).classList.add('active');
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
