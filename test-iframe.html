<!DOCTYPE html>
<html>
<head>
    <title>Test PluginIframe</title>
</head>
<body>
    <h1>PluginIframe Debug Test</h1>
    <div id="info"></div>
    <hr>
    <iframe id="testFrame" width="100%" height="600"></iframe>
    
    <script>
        // 模拟PluginIframe组件的逻辑
        const pluginId = 'docker';
        const token = localStorage.getItem('auth_token') || 'test-token';
        const GATEWAY_URL = 'http://127.0.0.1:3001';
        const src = token 
            ? `${GATEWAY_URL}/apps/${pluginId}/?token=${encodeURIComponent(token)}` 
            : `${GATEWAY_URL}/apps/${pluginId}/`;
        
        // 显示信息
        document.getElementById('info').innerHTML = `
            <p><strong>Plugin ID:</strong> ${pluginId}</p>
            <p><strong>Token:</strong> ${token ? token.substring(0, 20) + '...' : 'None'}</p>
            <p><strong>Iframe SRC:</strong> <code>${src}</code></p>
        `;
        
        // 设置iframe
        const iframe = document.getElementById('testFrame');
        iframe.src = src;
        
        // 监听iframe加载
        iframe.onload = () => {
            console.log('[Test] Iframe loaded successfully');
            console.log('[Test] Iframe location:', iframe.contentWindow.location);
        };
        
        iframe.onerror = (err) => {
            console.error('[Test] Iframe failed to load:', err);
        };
    </script>
</body>
</html>
