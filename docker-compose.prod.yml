services:
  navlink:
    image: ghcr.io/txwebroot/navlink:latest
    container_name: navlink-app
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      # 核心配置
      NODE_ENV: production
      PORT: 3001

      # 安全密钥（首次部署后请立即修改）
      JWT_SECRET: navlink-default-jwt-secret-please-change-in-production-2024
      SESSION_SECRET: navlink-default-session-secret-please-change-in-production-2024
      ENCRYPTION_KEY: navlink-default-encryption-key-32

      # 默认管理员账号（首次登录后请修改密码）
      DEFAULT_ADMIN_USERNAME: admin
      DEFAULT_ADMIN_PASSWORD: admin123
      # 插件商城配置（已在镜像中预设）
      # PLUGIN_REGISTRY_URL 和 PLUGIN_REGISTRY_TOKEN 会从镜像继承

    volumes:
      # 持久化数据存储
      - ./data:/app/data
      - ./plugins:/app/plugins
      - ./logs:/app/logs

    # 健康检查（可选）
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
